# Example Logstash pipeline configuration for testing
# This simulates a real parser host config that an agent might need to debug.

input {
  kafka {
    bootstrap_servers => "kafka-prod-01.internal:9093"
    topics => ["webapp-logs", "api-gateway-logs"]
    group_id => "logstash-webapp-consumer"
    consumer_threads => 4
    auto_offset_reset => "earliest"
  }
}

filter {
  # Parse JSON logs from the webapp
  if [topic] == "webapp-logs" {
    json {
      source => "message"
      target => "parsed"
    }

    # Extract timestamp from the log entry
    date {
      match => ["[parsed][timestamp]", "ISO8601"]
      target => "@timestamp"
    }

    # Tag failed requests
    if [parsed][status] =~ /^5\d\d/ {
      mutate {
        add_tag => ["server_error", "needs_investigation"]
      }
    }

    # Drop health check noise
    if [parsed][path] == "/health" or [parsed][path] == "/readiness" {
      drop {}
    }
  }

  # Parse API gateway logs
  if [topic] == "api-gateway-logs" {
    grok {
      match => {
        "message" => "%{IP:client_ip} %{WORD:method} %{URIPATH:path} %{NUMBER:status:int} %{NUMBER:duration:float}ms"
      }
    }

    # Calculate percentiles for latency tracking
    metrics {
      meter => "api_latency"
      gauge => ["duration"]
      flush_interval => 60
    }
  }

  # Common enrichment
  mutate {
    add_field => {
      "environment" => "production"
      "datacenter" => "us-east-1"
    }
    remove_field => ["[parsed][internal_id]"]
  }
}

output {
  elasticsearch {
    hosts => ["es-prod-01.internal:9200", "es-prod-02.internal:9200"]
    index => "logs-%{[topic]}-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_rollover_alias => "logs-%{[topic]}"
    ilm_pattern => "000001"
    ilm_policy => "30-day-retention"
  }
}
