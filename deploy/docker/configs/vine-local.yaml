# vine — local Docker testing config
# Database points at the postgres service on the Docker network.
# Sensitive values overridden via environment variables.

server:
  grpc_port: 50051
  http_port: 8080
  grpc_tls:
    cert: ""
    key: ""
    ca: ""

database:
  host: postgres
  port: 5432
  name: ivy
  user: ivy
  password: "ivy"
  sslmode: disable

llm:
  endpoint: "https://api.openai.com/v1"
  api_key: "" # Set via IVY_LLM_API_KEY env var
  default_model: "gpt-4o"
  embedding_model: "text-embedding-ada-002"
  embedding_dim: 1536

sandbox:
  docker_host: "unix:///var/run/docker.sock"
  agent_image: "ivy-agent-sandbox:latest"
  pipeline_image: "ivy-pipeline-sandbox:latest"
  max_concurrent: 10
  idle_timeout: "30m"
  cpu_limit: "1.0"
  memory_limit: "1g"

connectors:
  clickup:
    enabled: false
    api_token: "" # Set via IVY_CLICKUP_API_TOKEN env var
    team_id: "" # Set via IVY_CLICKUP_TEAM_ID env var
    list_id: ""
    space_id: ""
    tag: ""
    assignee: ""
    poll_interval: "30s"
    proxy: ""
    webhook_secret: ""
