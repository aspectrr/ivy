# leaf — local Docker testing config
# Points at the vine service on the Docker network.

vine:
  address: "vine:50051"
  tls:
    cert: ""
    key: ""
    ca: ""
  reconnect_interval: "5s"

allowed_directories:
  - "/etc/logstash"
  - "/var/log/logstash"

allowed_commands:
  - grep
  - awk
  - find
  - cat
  - tail
  - systemctl
  - journalctl

max_concurrent_commands: 3
command_timeout: "30s"
log_level: "debug"
