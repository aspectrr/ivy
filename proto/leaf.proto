syntax = "proto3";

package ivy.v1;

option go_package = "github.com/aspectrr/ivy/internal/ivyv1";

// ---------------------------------------------------------------------------
// Leaf Service
//
// The leaf daemon (on log parser hosts) is the CLIENT.
// The vine (main daemon) is the SERVER.
// The leaf initiates a bidirectional streaming connection so
// no inbound ports are needed on the log parser host.
// ---------------------------------------------------------------------------

service LeafService {
  // Bidirectional stream: leaf connects and keeps the stream alive.
  // The vine sends commands through the stream; the leaf responds
  // with output, heartbeats, and directory sync data.
  rpc Connect(stream LeafMessage) returns (stream VineCommand);

  // Unary fallback: execute a single command on the parser host.
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);

  // Unary: trigger a directory sync from the parser host.
  rpc SyncDirectory(SyncDirectoryRequest) returns (SyncDirectoryResponse);
}

// ---------------------------------------------------------------------------
// Whitelisted commands
// ---------------------------------------------------------------------------

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED      = 0;
  GREP                          = 1;
  AWK                           = 2;
  FIND                          = 3;
  CAT                           = 4;
  READ_FILE                     = 5;
  TAIL                          = 6;
  SYSTEMCTL_STATUS              = 7;
  JOURNALCTL                    = 8;
}

// ---------------------------------------------------------------------------
// Bidirectional stream messages
// ---------------------------------------------------------------------------

// Sent FROM leaf TO vine.
message LeafMessage {
  oneof payload {
    Heartbeat          heartbeat       = 1;
    CommandOutput      command_output  = 2;
    DirectoryChunk     directory_chunk = 3;
    Registration       registration    = 4;
  }
}

// Sent FROM vine TO leaf.
message VineCommand {
  oneof payload {
    ExecuteCommandRequest  execute_command  = 1;
    SyncDirectoryRequest   sync_directory   = 2;
  }
}

// ---------------------------------------------------------------------------
// Registration (first message on connect)
// ---------------------------------------------------------------------------

message Registration {
  string host_id     = 1; // unique identifier for this parser host
  string hostname    = 2;
  repeated string allowed_directories = 3;
}

// ---------------------------------------------------------------------------
// Heartbeat
// ---------------------------------------------------------------------------

message Heartbeat {
  int64  timestamp_ms = 1;
}

// ---------------------------------------------------------------------------
// Command execution
// ---------------------------------------------------------------------------

message ExecuteCommandRequest {
  string      request_id = 1;
  CommandType command    = 2;
  repeated string args   = 3;
  string      working_dir = 4; // must be within allowed directories
  int32       timeout_seconds = 5;
}

message ExecuteCommandResponse {
  string request_id  = 1;
  int32  exit_code   = 2;
  string stdout      = 3;
  string stderr      = 4;
  bool   timeout     = 5;
}

message CommandOutput {
  string request_id = 1; // matches ExecuteCommandRequest.request_id
  int32  exit_code  = 2;
  string stdout     = 3;
  string stderr     = 4;
  bool   timeout    = 5;
}

// ---------------------------------------------------------------------------
// Directory sync
// ---------------------------------------------------------------------------

message SyncDirectoryRequest {
  string request_id    = 1;
  string directory     = 2; // must be within allowed directories
}

message SyncDirectoryResponse {
  string       request_id  = 1;
  repeated FileInfo files  = 2;
  bytes         tar_data   = 3; // tar archive of the directory
}

message DirectoryChunk {
  string request_id = 1;
  oneof data {
    FileInfo  file_info = 2;
    bytes     chunk     = 3; // chunk of tar data
    bool      done      = 4; // signals end of transfer
  }
}

message FileInfo {
  string path         = 1;
  int64  size         = 2;
  string checksum_sha256 = 3;
}
