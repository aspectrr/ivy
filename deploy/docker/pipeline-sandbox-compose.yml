# Pipeline Sandbox — Redpanda → Logstash → Elasticsearch
# Used by the vine daemon to create isolated pipeline test environments.
# Each pipeline sandbox gets its own Docker network and container set.
#
# Redpanda is a Kafka-compatible broker — Logstash connects via the standard
# Kafka protocol. No changes needed to Logstash configs.

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ${RP_CONTAINER_NAME:-ivy-pipeline-redpanda}
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --smp
      - "1"
      - --memory
      - 256M
    networks:
      - pipeline
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 3s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ${ES_CONTAINER_NAME:-ivy-pipeline-es}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    networks:
      - pipeline
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: ${LOGSTASH_CONTAINER_NAME:-ivy-pipeline-logstash}
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    networks:
      - pipeline
    depends_on:
      redpanda:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

networks:
  pipeline:
    name: ${NETWORK_NAME:-ivy-pipeline}
    driver: bridge
