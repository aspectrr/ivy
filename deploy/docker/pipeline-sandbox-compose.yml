# Pipeline Sandbox — Kafka → Logstash → Elasticsearch
# Used by the vine daemon to create isolated pipeline test environments.
# Each pipeline sandbox gets its own Docker network and container set.
#
# This compose file is a TEMPLATE. The pipeline manager creates per-session
# instances with session-specific network, container names, and Logstash config.
#
# Images:
#   - Kafka: apache/kafka:latest (KRaft mode, no ZooKeeper)
#   - Elasticsearch: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
#   - Logstash: docker.elastic.co/logstash/logstash:8.17.0

services:
  kafka:
    image: apache/kafka:latest
    container_name: ${KAFKA_CONTAINER_NAME:-ivy-pipeline-kafka}
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,BROKER://:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - pipeline
    healthcheck:
      test: ["CMD-SHELL", "echo 'dump' | nc -w 2 localhost 9092 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ${ES_CONTAINER_NAME:-ivy-pipeline-es}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    networks:
      - pipeline
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: ${LOGSTASH_CONTAINER_NAME:-ivy-pipeline-logstash}
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    networks:
      - pipeline
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

networks:
  pipeline:
    name: ${NETWORK_NAME:-ivy-pipeline}
    driver: bridge
