procs:
  postgres:
    cwd: "."
    autostart: false
    shell: "docker-compose -f ./deploy/docker/docker-compose.local.yaml up postgres"
    stop: "SIGTERM"

  compose-up:
    cwd: "."
    autostart: false
    shell: "make docker-local"

  compose-down:
    cwd: "."
    autostart: false
    shell: "make docker-local-down"

  build-images:
    cwd: "."
    autostart: false
    shell: "make docker-local-build"

  build-vine:
    cwd: "."
    autostart: false
    shell: "make build-vine"

  build-ivy:
    cwd: "."
    autostart: false
    shell: "make build-ivy"

  build-leaf:
    cwd: "."
    autostart: false
    shell: "make build-leaf"

  test:
    cwd: "."
    autostart: false
    shell: "make test"

  test-e2e:
    cwd: "."
    autostart: false
    shell: "make test-e2e"

  test-integration:
    cwd: "."
    autostart: false
    shell: "make test-integration"

  lint:
    cwd: "."
    autostart: false
    shell: "make lint"

  proto-gen:
    cwd: "."
    autostart: false
    shell: "make proto-gen"

  tidy:
    cwd: "."
    autostart: false
    shell: "make tidy"

  clean:
    cwd: "."
    autostart: false
    shell: "make clean"
