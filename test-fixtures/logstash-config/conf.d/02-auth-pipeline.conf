# Second pipeline — auth service logs
# Simulates a more complex config with conditional logic.

input {
  kafka {
    bootstrap_servers => "kafka-prod-01.internal:9093"
    topics => ["auth-service-logs"]
    group_id => "logstash-auth-consumer"
    consumer_threads => 2
  }
}

filter {
  json {
    source => "message"
  }

  # Parse authentication events
  if [event_type] == "login" {
    mutate {
      add_field => { "log_category" => "authentication" }
    }

    # Flag brute force attempts
    ruby {
      code => '
        require "time"
        event.set("[@metadata][login_time]", Time.now.iso8601)
      '
    }
  }

  if [event_type] == "token_refresh" {
    mutate {
      add_field => { "log_category" => "token_operation" }
    }
  }

  # Redact sensitive fields
  mutate {
    remove_field => ["password", "token", "secret", "api_key"]
    gsub => [
      "message", "(password[\":\\s]+)\\S+", "\\1[REDACTED]",
      "message", "(token[\":\\s]+)\\S+", "\\1[REDACTED]"
    ]
  }

  # GeoIP enrichment on client IP
  if [client_ip] {
    geoip {
      source => "client_ip"
      fields => ["city_name", "country_name", "location"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["es-prod-01.internal:9200"]
    index => "logs-auth-%{+YYYY.MM.dd}"
  }

  # Also send security events to a separate index
  if "security_event" in [tags] {
    elasticsearch {
      hosts => ["es-prod-01.internal:9200"]
      index => "security-events-%{+YYYY.MM.dd}"
    }
  }
}
